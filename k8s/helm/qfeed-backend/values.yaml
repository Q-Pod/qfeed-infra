replicaCount: 3

image:
  repository: 092399857215.dkr.ecr.ap-northeast-2.amazonaws.com/qfeed-ecr-backend
  tag: "latest"
  pullPolicy: IfNotPresent

namespace: qfeed-backend-k8s-namespace

imagePullSecret: qfeed-backend-ecr-pull-secret

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits: {}

strategy:
  type: RollingUpdate
  maxSurge: 1
  maxUnavailable: 0

probes:
  startup:
    failureThreshold: 20
    periodSeconds: 3
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 10
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10

terminationGracePeriodSeconds: 40

secretRef: qfeed-backend-k8s-secret

env: {}

otel:
  disabled: "false"
  tracesExporter: "otlp"
  metricsExporter: "none"
  logsExporter: "none"
  serviceName: "qfeed-backend"
  resourceAttributes: "deployment.environment=prod,cluster=k8s-cluster"
  sampler: "parentbased_traceidratio"
  samplerArg: "0.1"
  protocol: "grpc"

pdb:
  minAvailable: 1

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8081"
  prometheus.io/path: "/actuator/prometheus"