alloy:
  configMap:
    create: false
    name: config-alloy-daemonset
    key: config.alloy

  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

  mounts:
    varlog: false
    dockercontainers: false
    extra:
      - name: host-proc
        mountPath: /host/proc
        readOnly: true
      - name: host-sys
        mountPath: /host/sys
        readOnly: true

  extraEnv:
    - name: NODE_NAME
      valueFrom:
        fieldRef:
          fieldPath: spec.nodeName

controller:
  type: daemonset
  hostNetwork: true
  dnsPolicy: ClusterFirstWithHostNet
  volumes:
    extra:
      - name: host-proc
        hostPath:
          path: /proc
      - name: host-sys
        hostPath:
          path: /sys

serviceAccount:
  create: true
  name: alloy-daemonset

rbac:
  create: true
