services:
  backend:
    image: ${ECR_REGISTRY}/qfeed-ecr-backend:${IMAGE_TAG}
    network_mode: host
    env_file: .env
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx768m -Xms384m
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_PROTOCOL=grpc
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://10.1.3.90:4317
      - OTEL_METRICS_EXPORTER=none
      - OTEL_LOGS_EXPORTER=none
      - OTEL_SERVICE_NAME=qfeed-backend-prod
    mem_limit: 1400m
    memswap_limit: 1400m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.13.2
    network_mode: host
    mem_limit: 150m
    memswap_limit: 150m
    restart: unless-stopped
    environment:
      - EC2_NAME=${EC2_NAME}
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=127.0.0.1:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
