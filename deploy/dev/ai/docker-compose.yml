services:
  ai:
    image: ${ECR_REGISTRY}/qfeed-ecr-ai:${IMAGE_TAG}
    network_mode: host
    env_file: .env
    mem_limit: 3500m
    memswap_limit: 3500m
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/ai')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  cadvisor:
    image: ghcr.io/google/cadvisor:latest
    network_mode: host
    privileged: true
    restart: unless-stopped
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - "--port=8082"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  alloy:
    image: grafana/alloy:v1.13.2
    network_mode: host
    mem_limit: 100m
    memswap_limit: 100m
    restart: unless-stopped
    environment:
      - EC2_NAME=${EC2_NAME}
    command:
      - "run"
      - "/etc/alloy/config.alloy"
      - "--server.http.listen-addr=127.0.0.1:12345"
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
