server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/wal/generator
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

storage:
  trace:
    backend: s3
    wal:
      path: /var/tempo/wal
    block:
      bloom_filter_false_positive: 0.05
    s3:
      bucket: qfeed-tempo-traces
      endpoint: s3.ap-northeast-2.amazonaws.com
      region: ap-northeast-2
      # IAM Role 인증 (EC2 instance profile) — access key 불필요

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
