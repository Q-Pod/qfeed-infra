# =============================================================================
# Prometheus Configuration
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 30s

rule_files:
  # - "rules/*.yml"

scrape_configs:
  # ---------------------------------------------------------
  # Prometheus self-monitoring
  # ---------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # ---------------------------------------------------------
  # Backend (Spring Boot Actuator + Micrometer)
  # ---------------------------------------------------------
  - job_name: "backend"
    metrics_path: /actuator/prometheus
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8081
        filters:
          - name: tag:Role
            values: ["backend"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role

  # ---------------------------------------------------------
  # AI (FastAPI + prometheus_fastapi_instrumentator)
  # ---------------------------------------------------------
  - job_name: "ai"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 8000
        filters:
          - name: tag:Role
            values: ["ai"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role

  # ---------------------------------------------------------
  # Redis Exporter
  # ---------------------------------------------------------
  - job_name: "redis"
    ec2_sd_configs:
      - region: ap-northeast-2
        port: 9121
        filters:
          - name: tag:Role
            values: ["redis"]
    relabel_configs:
      - source_labels: [__meta_ec2_tag_Name]
        target_label: instance
      - source_labels: [__meta_ec2_tag_Environment]
        target_label: environment
      - source_labels: [__meta_ec2_tag_Role]
        target_label: role
